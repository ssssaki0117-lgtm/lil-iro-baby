<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ネームタグ | lil iro baby</title>
  <meta name="description" content="名入れ刺繍のネームタグ。保育園・幼稚園のバッグやリュックに。小・大の2サイズ展開。lil iro babyのハンドメイドネームタグ。">
  <link rel="stylesheet" href="../style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    .items-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 140px 40px 100px;
    }
    .items-page-header {
      text-align: center;
      margin-bottom: 64px;
    }
    .items-page-header .section-title { margin-bottom: 12px; }
    .items-page-header p {
      font-size: 0.85rem;
      color: #9c8880;
      letter-spacing: 0.08em;
    }
    .items-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
      max-width: 700px;
      margin: 0 auto;
    }
    .item-card {
      display: block;
      text-align: center;
      transition: transform 0.3s;
    }
    .item-card:hover { transform: translateY(-4px); }
    .item-img-wrap {
      aspect-ratio: 1/1;
      background: #f5f0ea;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .item-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
      filter: brightness(1.05) contrast(0.95);
    }
    .item-card:hover .item-img-wrap img { transform: scale(1.04); }
    .item-name {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      color: #4a3f3a;
      margin-bottom: 8px;
      line-height: 1.6;
    }
    .item-shop-btn {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: #9c8880;
      border-bottom: 1px solid #c9b8ae;
      padding-bottom: 2px;
      margin-top: 8px;
      transition: color 0.2s;
    }
    .item-card:hover .item-shop-btn { color: #4a3f3a; }
    .back-link {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: #9c8880;
      margin-top: 64px;
      border-bottom: 1px solid #c9b8ae;
      padding-bottom: 2px;
    }
    @media (max-width: 768px) {
      .items-page { padding: 120px 24px 80px; }
      .items-grid { grid-template-columns: repeat(2, 1fr); gap: 24px; max-width: 100%; }
    }
  </style>
</head>
<body>

  <header class="header">
    <nav class="nav">
      <ul class="nav-links">
        <li><a href="../#products">items</a></li><li><a href="../#column">column</a></li><li><a href="../#about">about</a></li><li><a href="../#shop">shop</a></li>
      </ul>
      <div class="logo">
        <a href="../">lil iro baby</a>
      </div>
      <div class="nav-right">
        <a href="../#shop" class="nav-shop">online shop</a>
      </div>
    </nav>
  </header>

  <div class="items-page">
    <div class="items-page-header">
      <h1 class="section-title">ネームタグ</h1>
      <p>お名前と選べるモチーフで、かわいく名前管理</p>
    </div>

    <div class="items-grid">

      <a href="https://liliro168.base.shop/items/87369478" target="_blank" class="item-card">
        <div class="item-img-wrap">
          <img src="../images/products/nametag/nametag-small.jpg" alt="ネームタグ（小）">
        </div>
        <p class="item-name">ネームタグ（小）</p>
        <span class="item-shop-btn">BASE で見る →</span>
      </a>

      <a href="https://liliro168.base.shop/items/87369567" target="_blank" class="item-card">
        <div class="item-img-wrap">
          <img src="../images/products/nametag/nametag-large.jpg" alt="ネームタグ（大）">
        </div>
        <p class="item-name">ネームタグ（大）</p>
        <span class="item-shop-btn">BASE で見る →</span>
      </a>

    </div><!-- /items-grid -->

    <a href="../#products" class="back-link">← items 一覧に戻る</a>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-logo">lil iro baby</p>
      <nav class="footer-nav">
        <a href="../#about">about</a>
        <a href="../#products">items</a>
        <a href="../#column">column</a>
        <a href="../#shop">shop</a>
      </nav>
      <p class="footer-copy">&copy; 2024 lil iro baby. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
